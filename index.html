<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔴 Live Cams - LBFM</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --card: #1a1a1a;
      --accent: #ff2d55;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: #eee;
    }

    header {
      text-align: center;
      padding: 30px 20px;
      background: linear-gradient(135deg, #1f1f1f, #111);
      border-bottom: 4px solid var(--accent);
    }

    h1 { font-size: 2.8rem; margin-bottom: 8px; }
    .subtitle { color: #aaa; font-size: 1.1rem; }

    .counter {
      margin-top: 15px;
      font-size: 1.4rem;
      color: var(--accent);
      font-weight: bold;
    }

    .container {
      max-width: 1480px;
      margin: 30px auto;
      padding: 0 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 22px;
    }

    .card {
      background: var(--card);
      border-radius: 12px;
      overflow: hidden;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0,0,0,0.4);
    }

    .card:hover {
      transform: translateY(-10px);
      box-shadow: 0 15px 35px rgba(255,45,85,0.3);
    }

    .card img {
      width: 100%;
      height: 300px;
      object-fit: cover;
      background: #000;
    }

    .info {
      padding: 16px;
      text-align: center;
    }

    .live {
      display: inline-block;
      background: #ff2d55;
      color: white;
      padding: 4px 12px;
      border-radius: 9999px;
      font-size: 0.85rem;
      font-weight: bold;
      margin-bottom: 10px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      50% { opacity: 0.6; }
    }

    .name {
      font-size: 1.3rem;
      margin: 8px 0;
      font-weight: 600;
    }

    .watch-btn {
      display: inline-block;
      margin-top: 8px;
      padding: 10px 24px;
      background: var(--accent);
      color: white;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
    }

    .watch-btn:hover {
      background: #ff5975;
      transform: scale(1.05);
    }

    .empty, .error {
      text-align: center;
      padding: 80px 20px;
      color: #777;
      font-size: 1.3rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>🔴 Live Cams</h1>
    <p class="subtitle">LBFM • Real performers right now</p>
    <div class="counter" id="counter">Loading models...</div>
  </header>

  <div class="container">
    <div class="grid" id="grid"></div>
  </div>

  <script>
    async function loadCams() {
      const grid = document.getElementById('grid');
      const counterEl = document.getElementById('counter');

      grid.innerHTML = '<div class="empty">Loading live models...</div>';

      try {
        // Cache bust to always get fresh data
        let res = await fetch(`feed.json?v=${Date.now()}`);
        if (!res.ok) res = await fetch(`data.json?v=${Date.now()}`);

        const models = await res.json();

        const count = models ? models.length : 0;
        counterEl.textContent = `${count} Models Online Now`;

        if (count === 0) {
          grid.innerHTML = `<div class="empty">No models online right now 😔<br><small>Check back soon</small></div>`;
          return;
        }

        grid.innerHTML = '';

        models.forEach(m => {
          if (!m.title || m.title.length < 3) return;

          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `
            <img src="${m.image}" alt="${m.title}" 
                 onerror="this.src='https://via.placeholder.com/300x300/1a1a1a/888?text=${encodeURIComponent(m.title)}'">
            <div class="info">
              <div class="live">● LIVE</div>
              <div class="name">${m.title}</div>
              <a href="${m.link}" target="_blank" class="watch-btn">Watch Live</a>
            </div>
          `;
          grid.appendChild(card);
        });

      } catch (err) {
        console.error(err);
        counterEl.textContent = "Failed to load count";
        grid.innerHTML = `<div class="error">Failed to load feed.<br>Please refresh the page.</div>`;
      }
    }

    // Initial load
    loadCams();

    // Auto refresh every 3 minutes
    setInterval(loadCams, 180000);
  </script>
</body>
</html>
